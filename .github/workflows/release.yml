name: GitHub Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content -Raw VERSION).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "VERSION must be semantic Major.Minor.Patch for releases. Current value: '$version'"
          }

          $toml = Get-Content -Raw thunderstore.toml
          $match = [regex]::Match($toml, 'versionNumber\s*=\s*"([^"]+)"')
          if (-not $match.Success) {
            throw "versionNumber was not found in thunderstore.toml"
          }
          if ($match.Groups[1].Value -ne $version) {
            throw "VERSION ($version) does not match thunderstore.toml versionNumber ($($match.Groups[1].Value))"
          }

          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT
          echo "name=CustomEverything $version" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build release DLL
        shell: pwsh
        run: ./scripts/build.ps1 -Configuration Release -NoDeploy

      - name: Build manual release package
        shell: pwsh
        run: ./scripts/package.ps1 -Configuration Release -Package Manual

      - name: Render release notes
        id: notes
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $changelog = Get-Content -Raw CHANGELOG.md
          $sectionMatch = [regex]::Match(
            $changelog,
            "(?ms)^##\s+$([regex]::Escape($version))\b.*?(?=^##\s+|\z)"
          )
          $notes = if ($sectionMatch.Success) { $sectionMatch.Value.Trim() } else { $changelog.Trim() }
          $readme = Get-Content -Raw README.md
          $installMatch = [regex]::Match(
            $readme,
            '(?ms)^##\s+Install\s*(.*?)(?=^##\s+|\z)'
          )
          if (-not $installMatch.Success) {
            throw "README.md Install section was not found"
          }

          $installNotes = "## Install`r`n`r`n" + $installMatch.Groups[1].Value.Trim()
          $body = @(
            $installNotes
            $notes
          ) -join "`r`n`r`n"
          $path = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          Set-Content -NoNewline -Path $path -Value $body
          echo "path=$path" >> $env:GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.name }}
          body_path: ${{ steps.notes.outputs.path }}
          make_latest: true
          overwrite_files: true
          files: CustomEverything-${{ steps.version.outputs.version }}.zip
